# Alembic configuration file.
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts directory.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Sys.path adjustment (none needed; main.py / app/ are in the same dir).
prepend_sys_path = .

# Truncate long slugs in file names.
truncate_slug_length = 40

# Timezone for %%(year)d etc. in file_template.
# timezone =

# Maximum length of a revision hash (default 12).
# revision_environment = false

# The SQLAlchemy connection URL is read from the environment variable DATABASE_URL
# via env.py — do NOT hard-code credentials here.
sqlalchemy.url = sqlite+aiosqlite:///./hush.db

[post_write_hooks]
# Optionally run black/isort after generating migration files.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
